name: CI Pipeline MLflow & Docker

on:
  push:
    branches:
      - main

jobs:
  retrain-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.17.2
          pip install pandas numpy scikit-learn joblib

      # DEBUG (boleh dihapus nanti setelah sukses)
      - name: Show Repository Structure
        run: |
          pwd
          ls -la
          echo "===== ROOT ====="
          find . -maxdepth 2 -type f

      - name: Verify MLProject Folder
        run: |
          echo "===== MLPROJECT ====="
          ls -la MLProject

      - name: Run MLflow Project
        run: |
          mlflow run --env-manager local ./MLProject

      - name: Verify Generated Files
        run: |
          echo "===== AFTER TRAINING ====="
          ls -la MLProject

      - name: Upload model.pkl
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: MLProject/model.pkl

      - name: Upload MLflow Model
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model
          path: MLProject/model

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        working-directory: MLProject
        run: |
          mlflow models build-docker \
            --env-manager local \
            --model-uri model \
            --name churn-customer-model

      - name: Tag Docker Image
        run: |
          docker tag \
          churn-customer-model \
          ${{ secrets.DOCKER_USERNAME }}/churn-customer-model:latest

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/churn-customer-model:latest